services:
  app:
    build: .
    # Keep stdin open so the interactive CLI works.
    stdin_open: true
    tty: true
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CACHE_DB_PATH=/data/stocks_cache.db
    volumes:
      # SQLite cache persists across container restarts.
      - stock_cache:/data

volumes:
  stock_cache:
