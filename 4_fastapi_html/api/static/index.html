<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Analyst</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; }
    #app { width: 100%; max-width: 820px; height: 100vh; display: flex; flex-direction: column; background: #fff; box-shadow: 0 0 24px rgba(0,0,0,.08); }
    #header { padding: 16px 20px; background: #1a1a2e; color: #fff; }
    #header h1 { font-size: 1.05rem; font-weight: 600; }
    #header p { font-size: .78rem; color: #aaa; margin-top: 2px; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .msg { max-width: 78%; padding: 11px 15px; border-radius: 12px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
    .msg.user { align-self: flex-end; background: #1a1a2e; color: #fff; border-bottom-right-radius: 3px; }
    .msg.assistant { align-self: flex-start; background: #f0f2f5; color: #111; border-bottom-left-radius: 3px; }
    .tools-line { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; min-height: 0; }
    .tool-badge { background: #e8f4fd; color: #0066bb; border: 1px solid #b3d9f2; border-radius: 4px; font-size: .72rem; padding: 2px 8px; font-family: monospace; }
    .msg-text { line-height: 1.6; }
    #input-area { display: flex; gap: 8px; padding: 14px 16px; border-top: 1px solid #e4e4e4; }
    #user-input { flex: 1; padding: 10px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: .95rem; font-family: inherit; resize: none; line-height: 1.4; }
    #user-input:focus { outline: none; border-color: #1a1a2e; }
    #send-btn { padding: 10px 22px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: .95rem; font-weight: 500; transition: opacity .15s; }
    #send-btn:disabled { opacity: .35; cursor: not-allowed; }
    #send-btn:not(:disabled):hover { opacity: .85; }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <h1>Stock Analyst — MCP + Claude</h1>
      <p>Ask about AAPL, AMZN, GOOGL, META, MSFT, NFLX, NVDA, TSLA</p>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="user-input" rows="1" placeholder="e.g. What is NVDA's current price?"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    // Persist session across page refreshes so conversation history is kept.
    // Defensive: sessionStorage or crypto.randomUUID may be blocked in some contexts.
    function makeId() {
      try { return crypto.randomUUID(); } catch (_) {}
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }
    let sessionId;
    try {
      sessionId = sessionStorage.getItem("sid");
      if (!sessionId) { sessionId = makeId(); sessionStorage.setItem("sid", sessionId); }
    } catch (_) {
      sessionId = makeId();
    }

    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("user-input");
    const sendBtn    = document.getElementById("send-btn");

    function escHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function appendUserMsg(text) {
      const div = document.createElement("div");
      div.className = "msg user";
      div.textContent = text;
      messagesEl.appendChild(div);
      scrollBottom();
    }

    function createAssistantShell() {
      const div       = document.createElement("div");
      div.className   = "msg assistant";
      const toolsLine = document.createElement("div");
      toolsLine.className = "tools-line";
      const textDiv   = document.createElement("div");
      textDiv.className = "msg-text";
      div.appendChild(toolsLine);
      div.appendChild(textDiv);
      messagesEl.appendChild(div);
      scrollBottom();
      return { toolsLine, textDiv };
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value    = "";
      inputEl.disabled = true;
      sendBtn.disabled = true;

      appendUserMsg(text);
      const { toolsLine, textDiv } = createAssistantShell();

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, session_id: sessionId }),
        });

        const reader = res.body.getReader();
        const dec    = new TextDecoder();
        let buf      = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });

          // SSE frames are separated by double newlines.
          const parts = buf.split("\n\n");
          buf = parts.pop();  // keep the incomplete trailing chunk

          for (const part of parts) {
            if (!part.startsWith("data: ")) continue;
            const event = JSON.parse(part.slice(6));
            handleEvent(event, toolsLine, textDiv);
          }
        }
      } catch (err) {
        textDiv.innerHTML = `<span style="color:red">Network error: ${escHtml(String(err))}</span>`;
      } finally {
        // Always re-enable input in case the stream ended without a `done` event.
        inputEl.disabled = false;
        sendBtn.disabled = false;
      }
    }

    function handleEvent(event, toolsLine, textDiv) {
      if (event.type === "tool_call") {
        const badge       = document.createElement("span");
        badge.className   = "tool-badge";
        // Show the tool name and a compact args representation.
        const argsStr     = JSON.stringify(event.args);
        badge.textContent = `${event.name}(${argsStr})`;
        toolsLine.appendChild(badge);
        scrollBottom();

      } else if (event.type === "text") {
        textDiv.textContent = event.text;
        if (!toolsLine.hasChildNodes()) toolsLine.remove();
        scrollBottom();

      } else if (event.type === "done") {
        inputEl.focus();

      } else if (event.type === "error") {
        textDiv.innerHTML = `<span style="color:red">Error: ${escHtml(event.message)}</span>`;
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-grow textarea up to 5 rows.
    inputEl.addEventListener("input", () => {
      inputEl.rows = 1;
      const lines = Math.min(5, Math.ceil(inputEl.scrollHeight / 24));
      inputEl.rows = lines;
    });
  </script>
</body>
</html>
