services:
  mcp-server:
    build: ./server
    ports:
      - "8001:8001"
    volumes:
      # SQLite cache persists across container restarts.
      - stock_cache:/data
    environment:
      - CACHE_DB_PATH=/data/stocks_cache.db
      - HOST=0.0.0.0
      - PORT=8001
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8001)); s.close()\""
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

networks:
  default:
    name: stock_net

volumes:
  stock_cache:
